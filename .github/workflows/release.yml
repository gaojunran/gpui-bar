name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - uses: Swatinem/rust-cache@v2

      - name: Build .app bundle and DMG
        run: |
          chmod +x scripts/build_dmg.sh
          VERSION=${{ github.ref_name }} bash scripts/build_dmg.sh
          # move to a stable name matching the tag
          mv dist/gpui-bar-v*-macos.dmg "gpui-bar-${{ github.ref_name }}-macos.dmg"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: gpui-bar-${{ github.ref_name }}-macos.dmg
          generate_release_notes: true
