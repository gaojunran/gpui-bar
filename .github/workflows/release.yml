name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        run: |
          mkdir -p staging
          cp target/release/gpui-dashboard staging/
          cp README.md staging/
          tar -czf gpui-bar-${{ github.ref_name }}-macos.tar.gz -C staging .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: gpui-bar-${{ github.ref_name }}-macos.tar.gz
          generate_release_notes: true
